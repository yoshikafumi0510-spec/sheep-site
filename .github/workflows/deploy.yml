name: Hugo Deploy to Xserver

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: チェックアウト
        uses: actions/checkout@v4
        with:
          submodules: true

      - name: Hugoセットアップ
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: 'latest'

      - name: ビルド
        run: hugo --minify

      - name: SSHキーを設定
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.XSERVER_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -p 10022 ${{ secrets.XSERVER_HOST }} >> ~/.ssh/known_hosts

      - name: エックスサーバーにデプロイ
        run: |
          rsync -avz --delete -e "ssh -i ~/.ssh/id_ed25519 -p 10022" \
            public/ \
            ${{ secrets.XSERVER_USER }}@${{ secrets.XSERVER_HOST }}:${{ secrets.XSERVER_PATH }}